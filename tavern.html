<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spyglass Tavern</title>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/controls/OrbitControls.min.js"></script>
<style>
  body, html {
    margin: 0;
    height: 100%;
    overflow: hidden;
    background: black;
  }
  #panorama-container {
    width: 100%;
    height: 100%;
  }
  #toggle-rotation {
    position: absolute;
    bottom: 20px;
    right: 20px;
    padding: 10px 15px;
    background: rgba(0,0,0,0.6);
    color: white;
    border: none;
    cursor: pointer;
    font-family: sans-serif;
    font-size: 14px;
    border-radius: 5px;
  }
  #toggle-rotation:hover {
    background: rgba(0,0,0,0.8);
  }
</style>
</head>
<body>
<div id="panorama-container"></div>
<button id="toggle-rotation">Pause Rotation</button>

<script>
  // Scene, Camera, Renderer
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.getElementById('panorama-container').appendChild(renderer.domElement);

  // Load Panorama Textures
  const loader = new THREE.TextureLoader();
  const texturePaths = [
    'panorama/tavern/panorama_0.png', // px
    'panorama/tavern/panorama_1.png', // nx
    'panorama/tavern/panorama_2.png', // py
    'panorama/tavern/panorama_3.png', // ny
    'panorama/tavern/panorama_4.png', // pz
    'panorama/tavern/panorama_5.png', // nz
  ];

  const materials = texturePaths.map(path => {
    return new THREE.MeshBasicMaterial({
      map: loader.load(path),
      side: THREE.BackSide
    });
  });

  const geometry = new THREE.BoxGeometry(500, 500, 500);
  const cube = new THREE.Mesh(geometry, materials);
  scene.add(cube);

  camera.position.set(0, 0, 0);

  // OrbitControls for mouse look
  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableZoom = false;
  controls.enablePan = false;
  controls.rotateSpeed = 0.5;

  let autorotate = true;

  // Button toggle
  const button = document.getElementById('toggle-rotation');
  button.addEventListener('click', () => {
    autorotate = !autorotate;
    button.textContent = autorotate ? 'Pause Rotation' : 'Resume Rotation';
  });

  // Animate
  function animate() {
    requestAnimationFrame(animate);
    if (autorotate) {
      cube.rotation.y += 0.001; // slow rotation
    }
    controls.update();
    renderer.render(scene, camera);
  }

  animate();

  // Responsive
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
</script>
</body>
</html>
