<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spyglass Tavern</title>

  <!-- Open Graph -->
  <meta property="og:title"        content="Spyglass Tavern">
  <meta property="og:description"  content="Spinny!!">
  <meta property="og:image"        content="https://witch-craftmagazine.github.io/witchy-xp/images/spyglass.png">
  <meta property="og:url"          content="https://witch-craftmagazine.github.io/witchy-xp/spyglass">
  <meta property="og:type"         content="website">

  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="Spyglass Tavern">
  <meta name="twitter:description" content="Spinny!!">
  <meta name="twitter:image"       content="https://witch-craftmagazine.github.io/witchy-xp/images/spyglass.png">

  <!-- Custom Font -->
  <link rel="preload" href="fonts/craftmine.woff2" as="font" type="font/woff2" crossorigin>
  <style>
    @font-face {
      font-family: 'CraftMine';
      src: url('fonts/craftmine.woff2') format('woff2');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }
    body {
      margin: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'CraftMine', sans-serif;
    }

    /* Panorama container */
    #panorama-container {
      position: relative;
      width: 80vw;
      max-width: 800px;
      cursor: grab;
    }

    #panorama-container img {
      width: 100%;
      display: none;
      user-select: none;
    }

    #panorama-container img.active {
      display: block;
    }
  </style>

  <!-- Favicon -->
  <link rel="icon" href="images/spyglass.png" sizes="32x32">
  <link rel="apple-touch-icon" href="images/spyglass.png">
</head>
<body>

<div id="panorama-container">
  <img src="panorama/tavern/panorama_0.png" class="active" alt="Spyglass Tavern Panorama 0">
  <img src="panorama/tavern/panorama_1.png" alt="Spyglass Tavern Panorama 1">
  <img src="panorama/tavern/panorama_2.png" alt="Spyglass Tavern Panorama 2">
  <img src="panorama/tavern/panorama_3.png" alt="Spyglass Tavern Panorama 3">
  <img src="panorama/tavern/panorama_4.png" alt="Spyglass Tavern Panorama 4">
  <img src="panorama/tavern/panorama_5.png" alt="Spyglass Tavern Panorama 5">
</div>

<script>
const container = document.getElementById('panorama-container');
const images = container.querySelectorAll('img');
let current = 0;

// Auto-rotate panorama every 500ms
let interval = setInterval(() => {
  images[current].classList.remove('active');
  current = (current + 1) % images.length;
  images[current].classList.add('active');
}, 500);

// Drag to rotate manually
let isDragging = false;
let startX = 0;

container.addEventListener('mousedown', e => {
  isDragging = true;
  startX = e.clientX;
  clearInterval(interval); // stop auto-rotate while dragging
});

container.addEventListener('mouseup', e => {
  isDragging = false;
  interval = setInterval(() => { // resume auto-rotate
    images[current].classList.remove('active');
    current = (current + 1) % images.length;
    images[current].classList.add('active');
  }, 500);
});

container.addEventListener('mouseleave', e => isDragging = false);

container.addEventListener('mousemove', e => {
  if (!isDragging) return;
  let delta = e.clientX - startX;
  if (Math.abs(delta) > 20) {
    images[current].classList.remove('active');
    current = (delta > 0) ? (current - 1 + images.length) % images.length
                          : (current + 1) % images.length;
    images[current].classList.add('active');
    startX = e.clientX;
  }
});
</script>

</body>
</html>
