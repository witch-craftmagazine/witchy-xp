    HOW TO CUSTOMISE PER ROOM:
    1. Add/remove <a class="map-room"> nodes (copy an existing one).
    2. Adjust x/y/width/height on each <rect> to lay out the map.
    3. Update each <text> label and href.
    4. Add class="current" to THIS room's node.
    5. Update <line> / <polyline> connector coordinates to match.

    ROOM NODE ANATOMY:
      x, y   = top-left corner of the room box (in SVG units)
      width  = box width  (label fits ~9 chars at width=54)
      height = box height (18 is standard)

    CONNECTOR ANATOMY:
      x1,y1 = start point  (usually the edge midpoint of one room)
      x2,y2 = end point    (usually the edge midpoint of the next room)
      Use <polyline points="x1,y1 mx,my x2,y2"> for L-shaped bends.
    ══════════════════════════════════════════════════════════════════
  -->
  <div id="dungeon-map">
    <div class="map-heading">// MAP</div>
<svg width="400" height="100" viewBox="0 0 400 100">

</svg>

  <script type="module">
    import * as THREE from 'three';

    /* ── Three.js panorama setup ────────────────────────────────────── */
    const scene    = new THREE.Scene();
    const camera   = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    document.getElementById('panorama-container').appendChild(renderer.domElement);

    /*
      ══════════════════════════════════════════
      CUSTOMISE PER ROOM: update panorama folder/filenames.
      ══════════════════════════════════════════
    */
    const loader = new THREE.CubeTextureLoader();
    scene.background = loader.load([
      '../panorama/poolrooms/poolpurple/panorama_2.webp',
      '../panorama/poolrooms/poolpurple/panorama_0.webp',
      '../panorama/poolrooms/poolpurple/panorama_4.webp',
      '../panorama/poolrooms/poolpurple/panorama_5.webp',
      '../panorama/poolrooms/poolpurple/panorama_1.webp',
      '../panorama/poolrooms/poolpurple/panorama_3.webp'
    ]);

    let yaw = 0, pitch = 0;
    let autorotate = true;
    let isDragging = false;
    let lastX = 0, lastY = 0;

    const canvas = renderer.domElement;

    canvas.addEventListener('mousedown', e => { isDragging = true; lastX = e.clientX; lastY = e.clientY; });
    window.addEventListener('mouseup',   () => isDragging = false);
    window.addEventListener('mousemove', e => {
      if (!isDragging) return;
      yaw   -= (e.clientX - lastX) * 0.003;
      pitch -= (e.clientY - lastY) * 0.003;
      pitch  = Math.max(-Math.PI / 2.1, Math.min(Math.PI / 2.1, pitch));
      lastX = e.clientX; lastY = e.clientY;
    });

    canvas.addEventListener('touchstart', e => { isDragging = true; lastX = e.touches[0].clientX; lastY = e.touches[0].clientY; });
    window.addEventListener('touchend',   () => isDragging = false);
    window.addEventListener('touchmove',  e => {
      if (!isDragging) return;
      yaw   -= (e.touches[0].clientX - lastX) * 0.003;
      pitch -= (e.touches[0].clientY - lastY) * 0.003;
      pitch  = Math.max(-Math.PI / 2.1, Math.min(Math.PI / 2.1, pitch));
      lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
    });

    const rotBtn = document.getElementById('toggle-rotation');
    rotBtn.addEventListener('click', () => {
      autorotate = !autorotate;
      rotBtn.textContent = autorotate ? '⏸ PAUSE' : '▶ RESUME';
    });

    function animate() {
      requestAnimationFrame(animate);
      if (autorotate && !isDragging) yaw -= 0.002;
      camera.rotation.order = 'YXZ';
      camera.rotation.y = yaw;
      camera.rotation.x = pitch;
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    /* ── Timestamp HUD ──────────────────────────────────────────────── */
    const tsEl = document.getElementById('cam-timestamp');
    function updateTimestamp() {
      const now = new Date();
      const hh = String(now.getHours()).padStart(2,'0');
      const mm = String(now.getMinutes()).padStart(2,'0');
      const ss = String(now.getSeconds()).padStart(2,'0');
      const yyyy = now.getFullYear();
      const mo = String(now.getMonth()+1).padStart(2,'0');
      const dd = String(now.getDate()).padStart(2,'0');
      tsEl.textContent = `${hh}:${mm}:${ss}  ${yyyy}/${mo}/${dd}`;
    }
    updateTimestamp();
    setInterval(updateTimestamp, 1000);

    /* ── Glitch Engine ──────────────────────────────────────────────── */
    const glitchEl  = document.getElementById('glitch-overlay');
    const burstEl   = document.getElementById('static-burst');
    const scanEl    = document.getElementById('scanlines');

    // Random range helper
    const rnd = (min, max) => Math.random() * (max - min) + min;

    function rgbStripe() {
      // Quick horizontal colour-offset stripe
      const y   = Math.floor(rnd(0, 100));
      const h   = Math.floor(rnd(2, 18));
      const col = `rgba(${Math.random()>0.5?'255,0,80':'0,255,80'},0.15)`;
      glitchEl.style.background = `linear-gradient(transparent ${y}%, ${col} ${y}%, ${col} ${y+h}%, transparent ${y+h}%)`;
    }

    function horizontalTear() {
      // Multiple stripe tears
      const stops = [];
      const count = Math.floor(rnd(2, 5));
      for (let i = 0; i < count; i++) {
        const y  = Math.floor(rnd(0, 95));
        const h  = Math.floor(rnd(1, 6));
        const c  = `rgba(255,255,255,${rnd(0.03,0.12)})`;
        stops.push(`transparent ${y}%`, `${c} ${y}%`, `${c} ${y+h}%`, `transparent ${y+h}%`);
      }
      glitchEl.style.background = `linear-gradient(${stops.join(',')})`;
    }

    function staticBurst() {
      // Full-frame white flash
      burstEl.style.opacity = rnd(0.05, 0.25);
      burstEl.style.transition = 'opacity 0.04s';
      setTimeout(() => { burstEl.style.opacity = 0; }, 60);
    }

    function scanlineShift() {
      // Momentarily compress scanlines for a "roll" effect
      scanEl.style.backgroundSize = `100% ${Math.floor(rnd(40,120))}px`;
      setTimeout(() => { scanEl.style.backgroundSize = ''; }, rnd(80,200));
    }

    function doGlitch() {
      const type = Math.random();
      glitchEl.classList.add('active');

      if (type < 0.4)       rgbStripe();
      else if (type < 0.75) horizontalTear();
      else                  rgbStripe(), horizontalTear(); // combo

      if (Math.random() < 0.3) staticBurst();
      if (Math.random() < 0.25) scanlineShift();

      const duration = rnd(40, 180);
      setTimeout(() => {
        glitchEl.classList.remove('active');
        glitchEl.style.background = 'transparent';
      }, duration);

      // Sometimes trigger a rapid second hit
      if (Math.random() < 0.35) {
        setTimeout(doGlitch, rnd(duration + 30, duration + 200));
      }
    }

    function scheduleGlitch() {
      const delay = rnd(2500, 9000);
      setTimeout(() => { doGlitch(); scheduleGlitch(); }, delay);
    }
    scheduleGlitch();

    /* ── Dungeon map needs no JS — it's always visible ─────────────── */
  </script>
