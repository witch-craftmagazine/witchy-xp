  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/"

  <style>
  
    @font-face {
    font-family: 'craftmine';
    src: url('../fonts/craftmine.woff2') format('woff2'),
         url('../fonts/craftmine.woff') format('woff');
    font-weight: normal;
    font-style: normal;
    font-display: swap;
}
    /* ─── Reset & Base ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body, html {
      height: 100%;
      overflow: hidden;
      background: black;
      font-family: 'craftmine', Georgia, serif;
    }

    #panorama-container { width: 100%; height: 100%; }

    /* ─── Security Cam Tint ─────────────────────────────────────────── */
    #cam-tint {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
      /* Green phosphor tint — change to suit the room's vibe */
      background: rgba(0, 30, 10, 0.25);
      mix-blend-mode: multiply;
    }

    /* ─── Scanlines ─────────────────────────────────────────────────── */
    #scanlines {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 11;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(0, 0, 0, 0.18) 3px,
        rgba(0, 0, 0, 0.18) 4px
      );
      animation: scanline-drift 8s linear infinite;
    }
    @keyframes scanline-drift {
      0%   { background-position: 0 0; }
      100% { background-position: 0 80px; }
    }

    /* ─── Film Grain (SVG noise via canvas, applied as pseudo) ─────── */
    #grain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 12;
      opacity: 0.07;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 180px 180px;
      animation: grain-shift 0.15s steps(1) infinite;
    }
    @keyframes grain-shift {
      0%  { background-position: 0 0; }
      10% { background-position: -5% -10%; }
      20% { background-position: -15% 5%; }
      30% { background-position: 7% -25%; }
      40% { background-position: -5% 25%; }
      50% { background-position: -15% 10%; }
      60% { background-position: 15% 0%; }
      70% { background-position: 0% 15%; }
      80% { background-position: 3% 35%; }
      90% { background-position: -10% 10%; }
      100%{ background-position: 0 0; }
    }

    /* ─── Vignette ──────────────────────────────────────────────────── */
    #vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 13;
      background: radial-gradient(ellipse at center,
        transparent 50%,
        rgba(0,0,0,0.75) 100%
      );
    }

    /* ─── Glitch Overlay (JS-triggered) ────────────────────────────── */
    #glitch-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 14;
      opacity: 0;
      mix-blend-mode: screen;
      background: transparent;
      transition: opacity 0.05s;
    }
    #glitch-overlay.active {
      opacity: 1;
    }

    /* ─── HUD: Camera Label & REC ──────────────────────────────────── */
    #cam-hud {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 20;
      padding: 10px 14px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      pointer-events: none;
      color: rgba(120, 255, 140, 0.85);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-shadow: 0 0 6px rgba(0,255,80,0.5);
    }
    #cam-hud .cam-label { line-height: 1.6; }
    #cam-hud .cam-label span { display: block; }
    #cam-hud .rec-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      color: rgba(255, 80, 80, 0.9);
      text-shadow: 0 0 6px rgba(255,0,0,0.5);
      animation: rec-blink 1.4s ease-in-out infinite;
    }
    #cam-hud .rec-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,60,60,0.95);
      box-shadow: 0 0 6px rgba(255,0,0,0.8);
    }
    @keyframes rec-blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }

    /* ─── HUD: Timestamp ────────────────────────────────────────────── */
    #cam-timestamp {
      position: fixed;
      bottom: 60px; left: 14px;
      z-index: 20;
      pointer-events: none;
      color: rgba(120, 255, 140, 0.75);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-shadow: 0 0 5px rgba(0,255,80,0.4);
    }

    /* ─── Toggle Rotation Button ────────────────────────────────────── */
    #toggle-rotation {
      position: fixed;
      bottom: 20px; left: 14px;
      z-index: 30;
      padding: 8px 13px;
      background: rgba(0,0,0,0.55);
      color: rgba(120,255,140,0.85);
      border: 1px solid rgba(0,255,80,0.25);
      cursor: pointer;
      font-size: 11px;
      font-family: 'craftmine', Georgia, serif;
      letter-spacing: 0.1em;
      border-radius: 3px;
      text-shadow: 0 0 5px rgba(0,255,80,0.4);
      transition: background 0.2s, border-color 0.2s;
    }
    #toggle-rotation:hover {
      background: rgba(0,40,20,0.75);
      border-color: rgba(0,255,80,0.5);
    }

    /* ─── Dungeon Map ───────────────────────────────────────────────── */
    #dungeon-map {
      position: fixed;
      bottom: 16px; right: 16px;
      z-index: 30;
      background: rgba(0,0,0,0.72);
      border: 1px solid rgba(0,255,80,0.28);
      border-radius: 5px;
      padding: 10px 10px 8px;
      backdrop-filter: blur(3px);
      box-shadow: 0 0 18px rgba(0,255,80,0.08), inset 0 0 30px rgba(0,0,0,0.4);
    }
    #dungeon-map .map-heading {
      color: rgba(120,255,140,0.55);
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      text-shadow: 0 0 4px rgba(0,255,80,0.3);
      margin-bottom: 8px;
      text-align: center;
    }
    /* The SVG itself — room rects are <a> wrapped for clicking */
    #dungeon-map svg { display: block; overflow: visible; }

    /* Room node base */
    .map-room {
      cursor: pointer;
      text-decoration: none;
    }
    .map-room rect {
      fill: rgba(0,0,0,0.7);
      stroke: rgba(0,255,80,0.35);
      stroke-width: 1.5;
      rx: 3; ry: 3;
      transition: fill 0.15s, stroke 0.15s;
    }
    .map-room text {
      fill: rgba(120,255,140,0.7);
      font-family: 'Courier New', monospace;
      font-size: 8.5px;
      letter-spacing: 0.08em;
      text-anchor: middle;
      dominant-baseline: middle;
      pointer-events: none;
      text-shadow: none;
    }
    .map-room:hover rect {
      fill: rgba(0,60,20,0.8);
      stroke: rgba(0,255,80,0.75);
    }
    .map-room:hover text { fill: rgba(180,255,190,1); }

    /* Current room highlight */
    .map-room.current rect {
      fill: rgba(0,40,15,0.85);
      stroke: rgba(0,255,80,0.9);
      stroke-width: 2;
      filter: drop-shadow(0 0 4px rgba(0,255,80,0.6));
    }
    .map-room.current text { fill: rgba(200,255,210,1); }

    /* Connector lines between rooms */
    .map-connector {
      stroke: rgba(0,255,80,0.28);
      stroke-width: 1.2;
      stroke-dasharray: 3 3;
      fill: none;
    }

    /* ─── Static burst flash ────────────────────────────────────────── */
    #static-burst {
      position: fixed;
      inset: 0;
      z-index: 25;
      pointer-events: none;
      opacity: 0;
      background: white;
    }
  </style>

  <script type="module">
    import * as THREE from 'three';

    /* ── Three.js panorama setup ────────────────────────────────────── */
    const scene    = new THREE.Scene();
    const camera   = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    document.getElementById('panorama-container').appendChild(renderer.domElement);

    /*
      ══════════════════════════════════════════
      CUSTOMISE PER ROOM: update panorama folder/filenames.
      ══════════════════════════════════════════
    */
    const loader = new THREE.CubeTextureLoader();
    scene.background = loader.load([
      '../panorama/linklab/oldlab/panorama_2.webp',
      '../panorama/linklab/oldlab/panorama_0.webp',
      '../panorama/linklab/oldlab/panorama_4.webp',
      '../panorama/linklab/oldlab/panorama_5.webp',
      '../panorama/linklab/oldlab/panorama_1.webp',
      '../panorama/linklab/oldlab/panorama_3.webp'
    ]);

    let yaw = 0, pitch = 0;
    let autorotate = true;
    let isDragging = false;
    let lastX = 0, lastY = 0;

    const canvas = renderer.domElement;

    canvas.addEventListener('mousedown', e => { isDragging = true; lastX = e.clientX; lastY = e.clientY; });
    window.addEventListener('mouseup',   () => isDragging = false);
    window.addEventListener('mousemove', e => {
      if (!isDragging) return;
      yaw   -= (e.clientX - lastX) * 0.003;
      pitch -= (e.clientY - lastY) * 0.003;
      pitch  = Math.max(-Math.PI / 2.1, Math.min(Math.PI / 2.1, pitch));
      lastX = e.clientX; lastY = e.clientY;
    });

    canvas.addEventListener('touchstart', e => { isDragging = true; lastX = e.touches[0].clientX; lastY = e.touches[0].clientY; });
    window.addEventListener('touchend',   () => isDragging = false);
    window.addEventListener('touchmove',  e => {
      if (!isDragging) return;
      yaw   -= (e.touches[0].clientX - lastX) * 0.003;
      pitch -= (e.touches[0].clientY - lastY) * 0.003;
      pitch  = Math.max(-Math.PI / 2.1, Math.min(Math.PI / 2.1, pitch));
      lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
    });

    const rotBtn = document.getElementById('toggle-rotation');
    rotBtn.addEventListener('click', () => {
      autorotate = !autorotate;
      rotBtn.textContent = autorotate ? '⏸ PAUSE' : '▶ RESUME';
    });

    function animate() {
      requestAnimationFrame(animate);
      if (autorotate && !isDragging) yaw -= 0.002;
      camera.rotation.order = 'YXZ';
      camera.rotation.y = yaw;
      camera.rotation.x = pitch;
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    /* ── Timestamp HUD ──────────────────────────────────────────────── */
    const tsEl = document.getElementById('cam-timestamp');
    function updateTimestamp() {
      const now = new Date();
      const hh = String(now.getHours()).padStart(2,'0');
      const mm = String(now.getMinutes()).padStart(2,'0');
      const ss = String(now.getSeconds()).padStart(2,'0');
      const yyyy = now.getFullYear();
      const mo = String(now.getMonth()+1).padStart(2,'0');
      const dd = String(now.getDate()).padStart(2,'0');
      tsEl.textContent = `${hh}:${mm}:${ss}  ${yyyy}/${mo}/${dd}`;
    }
    updateTimestamp();
    setInterval(updateTimestamp, 1000);

    /* ── Glitch Engine ──────────────────────────────────────────────── */
    const glitchEl  = document.getElementById('glitch-overlay');
    const burstEl   = document.getElementById('static-burst');
    const scanEl    = document.getElementById('scanlines');

    // Random range helper
    const rnd = (min, max) => Math.random() * (max - min) + min;

    function rgbStripe() {
      // Quick horizontal colour-offset stripe
      const y   = Math.floor(rnd(0, 100));
      const h   = Math.floor(rnd(2, 18));
      const col = `rgba(${Math.random()>0.5?'255,0,80':'0,255,80'},0.15)`;
      glitchEl.style.background = `linear-gradient(transparent ${y}%, ${col} ${y}%, ${col} ${y+h}%, transparent ${y+h}%)`;
    }

    function horizontalTear() {
      // Multiple stripe tears
      const stops = [];
      const count = Math.floor(rnd(2, 5));
      for (let i = 0; i < count; i++) {
        const y  = Math.floor(rnd(0, 95));
        const h  = Math.floor(rnd(1, 6));
        const c  = `rgba(255,255,255,${rnd(0.03,0.12)})`;
        stops.push(`transparent ${y}%`, `${c} ${y}%`, `${c} ${y+h}%`, `transparent ${y+h}%`);
      }
      glitchEl.style.background = `linear-gradient(${stops.join(',')})`;
    }

    function staticBurst() {
      // Full-frame white flash
      burstEl.style.opacity = rnd(0.05, 0.25);
      burstEl.style.transition = 'opacity 0.04s';
      setTimeout(() => { burstEl.style.opacity = 0; }, 60);
    }

    function scanlineShift() {
      // Momentarily compress scanlines for a "roll" effect
      scanEl.style.backgroundSize = `100% ${Math.floor(rnd(40,120))}px`;
      setTimeout(() => { scanEl.style.backgroundSize = ''; }, rnd(80,200));
    }

    function doGlitch() {
      const type = Math.random();
      glitchEl.classList.add('active');

      if (type < 0.4)       rgbStripe();
      else if (type < 0.75) horizontalTear();
      else                  rgbStripe(), horizontalTear(); // combo

      if (Math.random() < 0.3) staticBurst();
      if (Math.random() < 0.25) scanlineShift();

      const duration = rnd(40, 180);
      setTimeout(() => {
        glitchEl.classList.remove('active');
        glitchEl.style.background = 'transparent';
      }, duration);

      // Sometimes trigger a rapid second hit
      if (Math.random() < 0.35) {
        setTimeout(doGlitch, rnd(duration + 30, duration + 200));
      }
    }

    function scheduleGlitch() {
      const delay = rnd(2500, 9000);
      setTimeout(() => { doGlitch(); scheduleGlitch(); }, delay);
    }
    scheduleGlitch();

    /* ── Dungeon map needs no JS — it's always visible ─────────────── */
  </script>
