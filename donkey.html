<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spyglass Tavern - Donkey</title>

  <!-- Open Graph -->
  <meta property="og:title"        content="Spyglass donkey">
  <meta property="og:description"  content="Spinny!!">
  <meta property="og:image"        content="https://witch-craftmagazine.github.io/witchy-xp/images/spyglass.png">
  <meta property="og:url"          content="https://witch-craftmagazine.github.io/witchy-xp/donkey">
  <meta property="og:type"         content="website">

  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="Spyglass donkey">
  <meta name="twitter:description" content="Spinny!!">
  <meta name="twitter:image"       content="https://witch-craftmagazine.github.io/witchy-xp/images/spyglass.png">

  <!-- Custom Font -->
  <link rel="preload" href="fonts/craftmine.woff2" as="font" type="font/woff2" crossorigin>

<link rel="stylesheet" href="css/bardstyle.css">

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="panorama-container"></div>
  
  
<a href="https://witch-craftmagazine.github.io/witchy-xp/spyglass" class="button-left">
  <img src="images/left.png" alt="Left Button">
</a>

<a href="https://witch-craftmagazine.github.io/witchy-xp/outside" class="button-right">
  <img src="images/right.png" alt="Right Button">
</a>

  
  <button id="toggle-rotation">Pause Rotation</button>

  <script type="module">
  import * as THREE from 'three';

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.getElementById('panorama-container').appendChild(renderer.domElement);

  const loader = new THREE.CubeTextureLoader();
  scene.background = loader.load([
    'panorama/donkey/panorama_2.png',
    'panorama/donkey/panorama_0.png',
    'panorama/donkey/panorama_4.png',
    'panorama/donkey/panorama_5.png',
    'panorama/donkey/panorama_1.png',
    'panorama/donkey/panorama_3.png'
  ]);

  // Track camera angles manually
  let yaw = 0;    // horizontal
  let pitch = 0;  // vertical

  let autorotate = true;
  let isDragging = false;
  let lastX = 0, lastY = 0;

  const canvas = renderer.domElement;

  canvas.addEventListener('mousedown', e => {
    isDragging = true;
    lastX = e.clientX;
    lastY = e.clientY;
  });
  window.addEventListener('mouseup',   () => isDragging = false);
  window.addEventListener('mousemove', e => {
    if (!isDragging) return;
    yaw   -= (e.clientX - lastX) * 0.003;
    pitch -= (e.clientY - lastY) * 0.003;
    pitch  = Math.max(-Math.PI / 2.1, Math.min(Math.PI / 2.1, pitch)); // clamp
    lastX  = e.clientX;
    lastY  = e.clientY;
  });

  // Touch support
  canvas.addEventListener('touchstart', e => {
    isDragging = true;
    lastX = e.touches[0].clientX;
    lastY = e.touches[0].clientY;
  });
  window.addEventListener('touchend',   () => isDragging = false);
  window.addEventListener('touchmove',  e => {
    if (!isDragging) return;
    yaw   -= (e.touches[0].clientX - lastX) * 0.003;
    pitch -= (e.touches[0].clientY - lastY) * 0.003;
    pitch  = Math.max(-Math.PI / 2.1, Math.min(Math.PI / 2.1, pitch));
    lastX  = e.touches[0].clientX;
    lastY  = e.touches[0].clientY;
  });

  const button = document.getElementById('toggle-rotation');
  button.addEventListener('click', () => {
    autorotate = !autorotate;
    button.textContent = autorotate ? 'Pause Rotation' : 'Resume Rotation';
  });

  function animate() {
    requestAnimationFrame(animate);

    if (autorotate && !isDragging) {
      yaw -= 0.002;
    }

    // Apply yaw then pitch using Euler order YXZ (standard for FPS/panorama)
    camera.rotation.order = 'YXZ';
    camera.rotation.y = yaw;
    camera.rotation.x = pitch;

    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
</script>
</body>
</html>
