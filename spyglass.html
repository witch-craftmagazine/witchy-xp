  <link rel="apple-touch-icon" href="images/spyglass.png">
</head>
<body>

<!--
  Layer order (z-index):
    0 · #bg              — tiled background, fills entire viewport
    1 · #reflection-*    — vertically flipped bg strip below the canvas
    2 · #content         — the 1512×860 canvas with all page elements
-->

<div id="bg"></div>

<div id="reflection-wrapper">
  <div id="reflection-inner"></div>
  <div id="reflection-fade"></div>
</div>

<!--
  #content is a fixed 1512×860 canvas.
  JS scales it to fill the viewport width, anchors it to the top,
  and centres it horizontally. All child positions use % so they
  move with the canvas automatically.

  Right-side columns (all items ~8.5% × 15%):
    Column A (left 79%): nether_star (top 3%), disc (top 23%)
    Column B (left 90%): clock (top 3%), spyglass (top 22%),
                         compass (top 41%), recovery_compass (top 60%)

  Bottom row (top 83%): bookitem (65%), glow_frame+potato (74%), item_frame+cod (82%)
-->
<div id="content">

  <!-- ── Large left-side decorations (no hover spin) ── -->
  <div class="img-wrapper" style="left:1%;top:57%;width:19%;height:42%;z-index:1">
    <img src="images/book.png" alt="">
  </div>

  <div class="img-wrapper" style="left:0%;top:3%;width:28%;height:49%;z-index:2">
    <img src="images/sign.png" alt="">
  </div>

  <!-- ── Right column A (left: 79%) ── -->
  <div class="img-wrapper spin" style="left:79%;top:3%;width:var(--item-w);height:var(--item-h);z-index:5">
    <img src="images/nether_star.png" alt="">
  </div>

  <div class="img-wrapper spin" style="left:79%;top:23%;width:var(--item-w);height:var(--item-h);z-index:4">
    <img src="images/disc.gif" alt="">
  </div>

  <!-- ── Right column B (left: 90%) ── -->
  <div class="img-wrapper spin" style="left:90%;top:3%;width:var(--item-w);height:var(--item-h);z-index:14">
    <img src="images/clock.gif" alt="">
  </div>

  <div class="img-wrapper spin" style="left:90%;top:22%;width:var(--item-w);height:var(--item-h);z-index:13">
    <img src="images/spyglass.png" alt="">
  </div>

  <div class="img-wrapper spin" style="left:90%;top:41%;width:var(--item-w);height:var(--item-h);z-index:15">
    <img src="images/compass.gif" alt="">
  </div>

  <div class="img-wrapper spin" style="left:90%;top:60%;width:var(--item-w);height:var(--item-h);z-index:17">
    <img src="images/recovery_compass1.gif" alt="">
  </div>

  <!-- ── Left mid / bottom items ── -->
  <div class="img-wrapper spin" style="left:22%;top:64%;width:var(--item-w);height:var(--item-h);z-index:8">
    <img src="images/potion.png" alt="">
  </div>

  <div class="img-wrapper spin" style="left:22%;top:82%;width:var(--item-w);height:var(--item-h);z-index:12">
    <img src="images/red_candle.png" alt="">
  </div>

  <!-- ── Bottom row ── -->
  <div class="img-wrapper spin" style="left:30%;top:64%;width:var(--item-w);height:var(--item-h);z-index:9">
    <img src="images/bookitem.png" alt="">
  </div>

  <!--
    glow_item_frame + potato — spin as one unit.
    Potato is inset ~16% / 15% and scaled to ~67% of the frame.
  -->
  <div class="img-wrapper group-spin" style="left:30%;top:83%;width:var(--item-w);height:var(--item-h);z-index:10">
    <img src="images/glow_item_frame.png" alt="" style="position:absolute;inset:0;width:100%;height:100%">
    <img src="images/potato.png"          alt="" style="position:absolute;left:16%;top:15%;width:67%;height:67%">
  </div>

  <!--
    item_frame + cod — spin as one unit.
    Cod is inset ~16% / 19% and scaled to ~65% of the frame.
  -->
  <div class="img-wrapper group-spin" style="left:40%;top:83%;width:var(--item-w);height:var(--item-h);z-index:11">
    <img src="images/item_frame.png" alt="" style="position:absolute;inset:0;width:100%;height:100%">
    <img src="images/cod.png"        alt="" style="position:absolute;left:16%;top:19%;width:65%;height:65%">
  </div>

  <!-- ── Text ── -->
  <div class="el shape-rect" style="left:3%;top:23%;width:22%;height:26%;z-index:24">
    <div class="sign">WE WILL MEET AGAIN AT SPYGLASS TAVERN</div>
  </div>

  <div class="el shape-rect" style="left:3%;top:60%;width:15%;height:36%;z-index:25">
    <div class="el-text">STARSWEETPEA'S SECRET DIARY DO NOT READ DO NOT TOUCH ESPECIALLY YOU LINK. dear diary, today I ate a potato.</div>
  </div>

  <!-- ── Nav buttons ── -->
<div id="nav-buttons">

  <a href="https://witch-craftmagazine.github.io/witchy-xp/tavern" class="group-spin">
    <figure>
      <img src="images/clock.gif" alt="Clock">
      <figcaption>Time</figcaption>
    </figure>
  </a>

  <a href="https://witch-craftmagazine.github.io/witchy-xp/hallway" class="group-spin">
    <figure>
      <img src="images/compass.gif" alt="Compass">
      <figcaption>Pathfinding</figcaption>
    </figure>
  </a>

  <a href="https://witch-craftmagazine.github.io/witchy-xp/images/outside" class="group-spin">
    <figure>
      <img src="images/recovery_compass1.gif" alt="Recovery Compass">
      <figcaption>Soulfinding</figcaption>
    </figure>
  </a>

</div>

</div><!-- /#content -->

<script>
(function () {
  const CW = 1512, CH = 860;

  const content   = document.getElementById('content');
  const bg        = document.getElementById('bg');
  const reflWrap  = document.getElementById('reflection-wrapper');
  const reflInner = document.getElementById('reflection-inner');

  function layout() {
    const winW = window.innerWidth;
    const winH = window.innerHeight;

    // Scale to fit width; if that would exceed viewport height, scale to fit height instead.
    const scale   = Math.min(winW / CW, winH / CH);
    const scaledW = CW * scale;
    const scaledH = CH * scale;

    // Horizontally centred, vertically anchored to the top.
    const offsetX = (winW - scaledW) / 2;

    // --- Canvas ---
    content.style.transform = `translate(${offsetX}px, 0px) scale(${scale})`;

    // --- Background tiling ---
    // Align tile origin to the canvas top-left so seams match across the page.
    bg.style.backgroundSize     = `${scaledW}px ${scaledH}px`;
    bg.style.backgroundPosition = `${offsetX}px 0px`;

    // --- Reflection ---
    // Only needed when the scaled canvas is shorter than the viewport
    // (i.e. the window is taller/narrower than the canvas aspect ratio).
    const remainingH = winH - scaledH;

    if (remainingH > 0) {
      // Position the wrapper strip directly below the canvas.
      reflWrap.style.top     = `${scaledH}px`;
      reflWrap.style.height  = `${remainingH}px`;
      reflWrap.style.display = 'block';

      // The inner div is the full canvas height with the same tiled background.
      // transform: translateY(scaledH) scaleY(-1)  (applied right-to-left):
      //   1. scaleY(-1)         — flip vertically around origin (top-left)
      //   2. translateY(scaledH)— shift down so the flipped image lands in the wrapper
      //
      // Net effect: local y=0 appears at wrapper y=scaledH (off-screen below),
      //             local y=scaledH appears at wrapper y=0 (top of reflection).
      // The wrapper clips to [0, remainingH], revealing only the bottom slice
      // of the canvas background — perfectly mirrored.
      reflInner.style.height          = `${scaledH}px`;
      reflInner.style.backgroundSize  = `${scaledW}px ${scaledH}px`;
      reflInner.style.backgroundPosition = `${offsetX}px 0px`;
      reflInner.style.transform       = `translateY(${scaledH}px) scaleY(-1)`;
    } else {
      reflWrap.style.display = 'none';
    }
  }

  layout();
  window.addEventListener('resize', layout);
})();
</script>
</body>
</html>
